<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIVIC | Admin Management</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="login-screen" class="screen">
        <div class="glass-card login-card">
            <h1>CIVIC Admin</h1>
            <p>Please authenticate to continue</p>
            <form id="login-form">
                <div class="input-group">
                    <i data-lucide="user"></i>
                    <input type="text" id="username" placeholder="Username / Email" required>
                </div>
                <div class="input-group">
                    <i data-lucide="lock"></i>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-primary">Login to Dashboard</button>
            </form>
            <div id="login-error" class="error-text"></div>
        </div>
    </div>

    <div id="dashboard-screen" class="screen" style="display: none;">
        <nav class="top-nav glass">
            <div class="nav-content">
                <div class="logo">
                    <span class="logo-text">CIVIC</span>
                    <span class="badge">ADMIN</span>
                </div>
                <div class="nav-actions">
                    <span id="admin-name">Administrator</span>
                    <button id="logout-btn" class="btn btn-secondary btn-icon">
                        <i data-lucide="log-out"></i>
                    </button>
                </div>
            </div>
        </nav>

        <main class="container">
            <header class="page-header">
                <div>
                    <h2>User Management</h2>
                    <p>Edit, block, or delete platform users</p>
                </div>
                <div class="search-box glass">
                    <i data-lucide="search"></i>
                    <input type="text" id="user-search" placeholder="Search by name, roll no, or username...">
                </div>
            </header>

            <div class="stats-grid">
                <div class="stat-card glass">
                    <i data-lucide="users"></i>
                    <div class="stat-info">
                        <span class="stat-label">Total Users</span>
                        <span id="total-users-count" class="stat-value">0</span>
                    </div>
                </div>
                <div class="stat-card glass danger">
                    <i data-lucide="user-x"></i>
                    <div class="stat-info">
                        <span class="stat-label">Blocked Users</span>
                        <span id="blocked-users-count" class="stat-value">0</span>
                    </div>
                </div>
            </div>

            <div class="user-table-container glass">
                <table id="user-table">
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Credentials</th>
                            <th>Campus / Branch</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="user-list">
                        <!-- User rows will be injected here -->
                    </tbody>
                </table>
                <div id="loading-state" class="loading-overlay">
                    <div class="spinner"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Edit User Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content glass">
            <div class="modal-header">
                <h3>Edit User</h3>
                <button class="close-modal">&times;</button>
            </div>
            <form id="edit-form">
                <input type="hidden" id="edit-user-id">
                <div class="grid-2">
                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" id="edit-fullname" required>
                    </div>
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" id="edit-username" required>
                    </div>
                </div>
                <div class="grid-2">
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="edit-email" required>
                    </div>
                    <div class="input-group">
                        <label>Roll Number</label>
                        <input type="text" id="edit-rollno" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary close-modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
