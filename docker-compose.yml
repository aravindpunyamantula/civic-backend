services:
  backend:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=${REDIS_URL}
    restart: always

  # Optional local Redis for testing
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always
